name: Continuous Integration

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    test:
        name: Test & Lint
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                node-version: [18.x, 20.x, 22.x]
                os: [ubuntu-latest]
            fail-fast: false

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run linting
              run: npm run lint

            - name: Run tests
              run: npx jest test/engine/ test/checkers/ test/interfaces/ --verbose
              env:
                  CI: true

            - name: Validate CLI
              run: |
                  node bin/repo-manager.js check --format json > /dev/null
                  node bin/repo-manager.js config > /dev/null
                  echo "CLI validation passed"

            - name: Validate package
              run: npm pack --dry-run

            - name: Security audit
              run: npm audit --audit-level high
              continue-on-error: true
